spring.profiles.active=oracle

#WhetherDataPuller settings
openWeatherMapUrl=http://api.openweathermap.org/data/2.5/forecast?id=703448&appid=41a379bb03ac781ec6c814b80f49c0b4
currentWeatherUrl=http://api.openweathermap.org/data/2.5/weather?id=703448&appid=41a379bb03ac781ec6c814b80f49c0b4&units=metric

#openWhetherMapUrl=http://samples.openweathermap.org/data/2.5/forecast?id=524901&appid=b6907d289e10d714a6e88b30761fae22
whetherDataPullerDelay=0 0 * ? * *

#liquibase config
liquibase.enabled=false

logging.level.org.springframework.web=DEBUG
#logging.level.com.fasterxml.jackson=DEBUG
#logging.level.org.hibernate=DEBUG

health-tracker.api.base-url=http://localhost:8082
health-tracker.api.timeouts.connect-timeout=5000
health-tracker.api.timeouts.response-timeout=5s
health-tracker.api.timeouts.read-timeout=5
health-tracker.api.timeouts.write-timeout=5

open-weather.forecast.5days.topic=weather-forecast
health-tracker.user.blood.pressure.topic=user-bp

#Kafka configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=health-tracker-group

#Producer configuration
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

#Consumer configuration
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.sergtm.health.tracker.monitoring.kafka.event